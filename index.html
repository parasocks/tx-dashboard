<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TX 16策略組合 - Paper Trade</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>:root {
  --bg: #0f1115;
  --panel: #181b22;
  --panel-2: #20242d;
  --border: #2a2f3a;
  --text: #e6e8ee;
  --muted: #8a90a0;
  --accent: #5aa0ff;
  --good: #2ecc71;
  --bad: #ff5b6e;
  --warn: #f5a524;
  --pill-bg: #2a2f3a;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", "PingFang TC",
               "Helvetica Neue", Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

a { color: var(--accent); text-decoration: none; }
code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
       background: var(--panel-2); padding: 1px 6px; border-radius: 4px; }
pre code { display: block; padding: 12px; overflow-x: auto; }

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}
.topbar h1 { margin: 0; font-size: 18px; font-weight: 600; }
.topbar .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }

.legend { display: flex; gap: 8px; }
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 999px;
  font-size: 12px;
  background: var(--pill-bg);
  color: var(--text);
  border: 1px solid var(--border);
}
.pill-strong { background: #2d6cdf; color: #fff; border-color: transparent; }
.pill-medium { background: #3a4250; color: #d6d9e0; border-color: transparent; }
.pill-pending { background: #6b4f00; color: #ffd980; border-color: transparent; }

.tabs {
  display: flex;
  gap: 4px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}
.tab {
  background: transparent;
  color: var(--muted);
  border: 1px solid transparent;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--panel-2);
  color: var(--text);
  border-color: var(--border);
}

main { padding: 16px 24px 48px; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.card h2 { margin: 0 0 8px; font-size: 15px; font-weight: 600; }
.card h3 { margin: 16px 0 4px; font-size: 14px; font-weight: 600; color: var(--text); }
.card p.muted { color: var(--muted); margin: 0 0 12px; font-size: 12px; }
.muted { color: var(--muted); }

.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 12px;
}
.kpi {
  background: var(--panel-2);
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
}
.kpi .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi .v { font-size: 18px; font-weight: 600; margin-top: 2px; }
.kpi .sub { color: var(--muted); font-size: 11px; }

.kpi-hero {
  background: linear-gradient(135deg, #1c2a3a 0%, #1f2030 100%);
  border-color: #2d6cdf;
}
.kpi-hero .v { font-size: 22px; }
.perf-card h2 { display: inline-block; }

.chart-wrap {
  position: relative;
  height: 280px;
  margin-top: 4px;
}

.signal-day {
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
  background: var(--panel);
}
.signal-day > header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: var(--panel-2);
  cursor: pointer;
  user-select: none;
}
.signal-day > header:hover { background: #262b36; }
.signal-day > header .left { display: flex; align-items: baseline; gap: 10px; }
.signal-day > header .date { font-weight: 600; font-size: 14px; }
.signal-day > header .sub { color: var(--muted); font-size: 12px; }
.signal-day > header .summary {
  display: flex; gap: 14px; align-items: baseline;
}
.signal-day > header .summary .item { font-size: 12px; color: var(--muted); }
.signal-day > header .summary .item b { color: var(--text); font-weight: 600; }
.signal-day > .body { display: none; padding: 12px 16px; }
.signal-day.open > .body { display: block; }
.signal-day.open > header .caret { transform: rotate(90deg); }
.caret { display: inline-block; transition: transform 0.15s; color: var(--muted); }

table.stocks {
  border-collapse: collapse;
  font-size: 13px;
  width: max-content;
  min-width: 100%;
}

/* 表格用的橫向捲動容器, 包在 .table-scroll 內以避免被 parent 的 overflow:hidden 切掉 */
.table-scroll {
  overflow-x: auto;
  max-width: 100%;
  -webkit-overflow-scrolling: touch;
}
.table-scroll::after {
  /* 視覺提示「可以往右滑」 — 在 .body 右邊 padding 顯示淡淡的指示 */
  content: "";
}
table.stocks thead th {
  text-align: right;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  font-weight: 500;
  white-space: nowrap;
}
table.stocks thead th:first-child,
table.stocks thead th.left { text-align: left; }
table.stocks tbody td {
  padding: 6px 8px;
  border-bottom: 1px solid #20242d;
  text-align: right;
  white-space: nowrap;
}
table.stocks tbody td:first-child,
table.stocks tbody td.left { text-align: left; }
table.stocks tbody tr:hover { background: #1c2029; }

.pos { color: var(--good); }
.neg { color: var(--bad); }
.dim { color: var(--muted); }

.strength-2 { color: #84b0ff; font-weight: 600; }
.strength-1 { color: #d6d9e0; }

.path-spark {
  display: inline-block;
  width: 80px;
  height: 22px;
  vertical-align: middle;
}

.pending-banner {
  background: #3a2c00;
  border: 1px solid #6b4f00;
  color: #ffd980;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 8px;
}

.signal-day.pending-row { border-left: 3px solid #f5a524; }
.signal-day.pending-row > header { background: #2a2614; }
.signal-day.carried-row > header { background: #2a2510; }
.signal-day.carried-row { border-left: 3px solid #6b4f00; }

.diff-wrap { font-size: 12px; }
.diff-wrap code {
  background: transparent;
  padding: 0;
  color: #b0c8e6;
  font-size: 11px;
}

/* ---------- table horizontal-scroll wrapper ---------- */
.signal-day > .body { -webkit-overflow-scrolling: touch; }

/* ---------- mobile (≤ 720px) ---------- */
@media (max-width: 720px) {
  body { font-size: 13px; }
  main { padding: 12px 12px 36px; }

  .topbar {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    padding: 12px 14px;
  }
  .topbar h1 { font-size: 16px; }
  .topbar .meta { font-size: 11px; line-height: 1.4; }
  .legend { flex-wrap: wrap; }

  .tabs {
    overflow-x: auto;
    flex-wrap: nowrap;
    padding: 6px 10px;
    -webkit-overflow-scrolling: touch;
  }
  .tab { flex-shrink: 0; padding: 5px 12px; font-size: 12px; }

  .card { padding: 12px 14px; border-radius: 8px; margin-bottom: 12px; }
  .card h2 { font-size: 14px; }
  .card p.muted { font-size: 11px; }

  .kpi-row {
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
  }
  .kpi { padding: 8px 10px; }
  .kpi .v { font-size: 15px; }
  .kpi-hero .v { font-size: 18px; }
  .kpi .k { font-size: 10px; }
  .kpi .sub { font-size: 10px; }

  .chart-wrap { height: 220px; }

  /* 每日持倉 header: 把右邊的 summary 換行到下方, 避免擠不下 */
  .signal-day > header {
    flex-wrap: wrap;
    gap: 4px 8px;
    padding: 8px 12px;
  }
  .signal-day > header .left { font-size: 13px; flex-wrap: wrap; gap: 4px 8px; }
  .signal-day > header .left .sub { font-size: 11px; }
  .signal-day > header .summary {
    flex-basis: 100%;
    margin-top: 2px;
    gap: 10px;
  }
  .signal-day > header .summary .item { font-size: 11px; }
  .signal-day > .body { padding: 10px 12px; }

  .diff-wrap { font-size: 11px; }
  .diff-wrap code { font-size: 10px; }

  table.stocks { font-size: 12px; }
  table.stocks thead th { padding: 4px 6px; }
  table.stocks tbody td { padding: 4px 6px; }
  table.stocks tbody td:first-child code { font-size: 11px; }
}

/* ---------- 極窄 (≤ 420px) 進一步壓縮 ---------- */
@media (max-width: 420px) {
  main { padding: 10px 8px 32px; }
  .card { padding: 10px 12px; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .kpi-hero { grid-column: span 2; }
  .signal-day > header .summary { gap: 8px; }
  .signal-day > header .summary .item { white-space: nowrap; }
}


.grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(330px,1fr)); gap:16px; padding:16px 24px; }
.card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:16px; }
.card h2 { margin:0 0 10px; font-size:15px; }
.big { font-size:26px; font-weight:700; }
.kv { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px dashed var(--border); font-size:13px; }
.kv span:last-child { font-weight:600; }
table.t { width:100%; border-collapse:collapse; font-size:12.5px; }
table.t th, table.t td { padding:4px 8px; border-bottom:1px solid var(--border); text-align:left; }
.pos-long { color:var(--good); } .pos-short { color:var(--bad); } .pos-flat { color:var(--muted); }
.warnline { color:var(--warn); font-size:12.5px; padding:2px 0; }
.chart-wrap { position:relative; height:260px; }
.order-box { background:var(--panel-2); border-radius:8px; padding:12px; text-align:center; margin-top:8px; }
</style></head><body>

<header class="topbar">
  <div class="title">
    <h1>台指期 16 策略組合 · Paper Trade</h1>
    <div class="meta" id="meta-line"></div>
  </div>
  <div class="legend">
    <span class="pill" id="pill-equity"></span>
    <span class="pill" id="pill-sharpe"></span>
  </div>
</header>
<main>
  <div class="grid">
    <div class="card" style="grid-column: 1 / -1;">
      <h2>📈 Paper Equity</h2>
      <div class="chart-wrap"><canvas id="eq-chart"></canvas></div>
    </div>
    <div class="card">
      <h2>📋 今日單</h2>
      <div id="order"></div>
    </div>
    <div class="card">
      <h2>📊 績效</h2>
      <div id="stats"></div>
    </div>
    <div class="card">
      <h2>🧭 16 策略部位</h2>
      <div id="positions"></div>
    </div>
    <div class="card">
      <h2>🚦 資料閘門</h2>
      <div id="gate"></div>
    </div>
    <div class="card" style="grid-column: 1 / -1;">
      <h2>每日損益 (NT$)</h2>
      <div class="chart-wrap"><canvas id="pnl-chart"></canvas></div>
    </div>
    <div class="card" style="grid-column: 1 / -1;">
      <h2>⚠️ 警告 / 事件</h2>
      <div id="warnings"></div>
    </div>
  </div>
</main>

<script>window.TX_DATA = {"detail": {"run_ts": "2026-06-19 07:46:30.405354", "signal_date": "2026-06-18", "close": 46769.0, "net": 0.004, "lev": 3.77, "target_mtx": 0, "holdings": 0, "trade_today": 0, "equity": 5230457.0, "capital": 5000000, "positions": {"9_隔夜溢價x籌碼": 0.0, "23_TXOcallOI價格corr": 0.364, "22_TXO異常OI": -0.527, "5_半導體相對強弱": 0.127, "4_夜盤趨勢ADX": 0.183, "3_OIvol微結構": 0.203, "21_融資維持率regime": 0.164, "24_日盤反轉家族": -0.17, "25_尾盤反轉家族": 0.185, "26_美股收盤窗動能": -0.298, "27_現貨收盤量能": -0.097, "28_價差carry家族": 0.176, "29_TXO窗IV恐慌fade": 0.033, "30_TX大額淨水位": -0.313, "31_TE電子二梯隊": 0.048, "32_TF金融rotation": -0.047}, "gate": [{"來源": "TaiwanFuturesDaily(panel)", "最後日": "2026-06-18", "期望": "2026-06-18", "落後天": 0, "狀態": "OK", "影響": "全部"}, {"來源": "TaiwanOptionDaily", "最後日": "2026-06-18", "期望": "2026-06-18", "落後天": 0, "狀態": "OK", "影響": "#22/#23"}, {"來源": "LargeTraders(大額)", "最後日": "2026-06-18", "期望": "2026-06-18", "落後天": 0, "狀態": "OK", "影響": "#30/31/32"}, {"來源": "SpreadTrading(價差)", "最後日": "2026-06-16", "期望": "2026-06-18", "落後天": 2, "狀態": "WARN", "影響": "#28"}, {"來源": "FuturesTick", "最後日": "2026-06-17", "期望": "2026-06-18", "落後天": 1, "狀態": "WARN", "影響": "#25/26/27"}, {"來源": "OptionTick", "最後日": "2026-06-17", "期望": "2026-06-18", "落後天": 1, "狀態": "WARN", "影響": "#29"}], "warnings": ["SpreadTrading(價差) 落後 2 天 (假日可能誤報) — 影響 #28", "FuturesTick 落後 1 天 (假日可能誤報) — 影響 #25/26/27", "OptionTick 落後 1 天 (假日可能誤報) — 影響 #29"], "events": [["FOMC後", "減碼/偏空", "2026-06-17 後 (-0.6%)"]], "upcoming": []}, "stats": {"days": 5, "total_pnl": 230457.0, "sharpe": null, "mdd": "-0.02%", "win_rate": "60%"}, "history": [{"date": "2026-06-12", "close": 44188.0, "day_pnl": 0.0, "trade": 0, "fill_px": NaN, "cost": 0.0, "holdings": 0, "equity": 5000000.0}, {"date": "2026-06-15", "close": 45580.0, "day_pnl": 0.0, "trade": 7, "fill_px": 45581.0, "cost": 844.0, "holdings": 7, "equity": 4999156.0}, {"date": "2026-06-16", "close": 45849.0, "day_pnl": 94150.0, "trade": -4, "fill_px": 45848.0, "cost": 483.0, "holdings": 3, "equity": 5092823.0}, {"date": "2026-06-17", "close": 46031.0, "day_pnl": 27300.0, "trade": 0, "fill_px": NaN, "cost": 0.0, "holdings": 3, "equity": 5120123.0}, {"date": "2026-06-18", "close": 46769.0, "day_pnl": 110700.0, "trade": -3, "fill_px": 46768.0, "cost": 365.0, "holdings": 0, "equity": 5230457.0}]};</script>
<script>const D = window.TX_DATA || {};
const det = D.detail || {}, hist = D.history || [], stats = D.stats || {};
const fmt = n => (n==null||n==="") ? "-" : Number(n).toLocaleString("zh-TW");

document.getElementById("meta-line").textContent =
  `signal_date ${det.signal_date||"-"} · 收盤 ${fmt(det.close)} · 更新 ${det.run_ts||"-"}`;
document.getElementById("pill-equity").textContent = `Equity ${fmt(det.equity)}`;
document.getElementById("pill-sharpe").textContent = `Sharpe ${stats.sharpe ?? "-"}`;

// 今日單
const trade = det.trade_today ?? 0;
document.getElementById("order").innerHTML = `
  <div class="kv"><span>淨部位 (NEU)</span><span>${det.net}</span></div>
  <div class="kv"><span>槓桿</span><span>${det.lev}x</span></div>
  <div class="kv"><span>目標</span><span>${det.target_mtx>0?"+":""}${det.target_mtx} 口 MTX</span></div>
  <div class="kv"><span>目前持有</span><span>${det.holdings>0?"+":""}${det.holdings} 口</span></div>
  <div class="order-box">
    <div class="muted" style="font-size:12px">今日 13:45 收盤應交易</div>
    <div class="big ${trade>0?"pos-long":trade<0?"pos-short":"pos-flat"}">${trade>0?"買 +":trade<0?"賣 ":""}${trade} 口 MTX</div>
  </div>`;

// 績效
document.getElementById("stats").innerHTML = `
  <div class="kv"><span>paper 天數</span><span>${stats.days ?? 0}</span></div>
  <div class="kv"><span>累積損益</span><span>${fmt(stats.total_pnl)}</span></div>
  <div class="kv"><span>Sharpe (年化)</span><span>${stats.sharpe ?? "-"}</span></div>
  <div class="kv"><span>最大回撤</span><span>${stats.mdd ?? "-"}</span></div>
  <div class="kv"><span>日勝率</span><span>${stats.win_rate ?? "-"}</span></div>`;

// 16 策略部位
const pos = det.positions || {};
document.getElementById("positions").innerHTML = "<table class='t'>" +
  Object.entries(pos).map(([k,v])=>{
    const c = v>0.05?"pos-long":v<-0.05?"pos-short":"pos-flat";
    const d = v>0.05?"多":v<-0.05?"空":"–";
    return `<tr><td>${k}</td><td class="${c}">${d}</td><td class="${c}">${v>0?"+":""}${v}</td></tr>`;
  }).join("") + "</table>";

// 資料閘門
const gate = det.gate || [];
document.getElementById("gate").innerHTML = "<table class='t'><tr><th>來源</th><th>最後日</th><th>狀態</th></tr>" +
  gate.map(g=>{
    const c = g["狀態"]==="OK"?"pos-long":(g["狀態"]==="WARN"?"":"pos-short");
    return `<tr><td>${g["來源"]}</td><td>${g["最後日"]}</td><td class="${c}">${g["狀態"]}</td></tr>`;
  }).join("") + "</table>";

// 警告 + 事件
const w = (det.warnings||[]).map(x=>`<div class="warnline">⚠️ ${x}</div>`).join("");
const ev = (det.events||[]).map(e=>`<div class="warnline">📅 ${e[0]}: ${e[1]} — ${e[2]}</div>`).join("");
const up = (det.upcoming||[]).length ? `<div class="muted">近期: ${(det.upcoming||[]).join(" / ")}</div>` : "";
document.getElementById("warnings").innerHTML = (w+ev+up) || "<div class='muted'>無</div>";

// 圖
if (hist.length) {
  const labels = hist.map(h=>h.date);
  new Chart(document.getElementById("eq-chart"), {
    type: "line",
    data: { labels, datasets: [{ label:"Equity", data: hist.map(h=>h.equity),
      borderColor:"#5aa0ff", backgroundColor:"rgba(90,160,255,.12)", fill:true, pointRadius:0, tension:.2 }]},
    options: { maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:"#8a90a0",maxTicksLimit:10}}, y:{ticks:{color:"#8a90a0"}} } }
  });
  new Chart(document.getElementById("pnl-chart"), {
    type: "bar",
    data: { labels, datasets: [{ data: hist.map(h=>h.day_pnl),
      backgroundColor: hist.map(h=>h.day_pnl>=0?"rgba(46,204,113,.8)":"rgba(255,91,110,.8)") }]},
    options: { maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:"#8a90a0",maxTicksLimit:10}}, y:{ticks:{color:"#8a90a0"}} } }
  });
}
</script>
</body></html>
