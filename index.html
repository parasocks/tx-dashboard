const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function go(){
  const err = document.getElementById('err'); err.textContent = '解密中...';
  try{
    const pw = document.getElementById('pw').value;
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(P.salt), iterations:P.iter, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(P.iv)}, key, b64(P.ct));
    sessionStorage.setItem('txpw', pw);
    try{ if(document.getElementById('remember').checked) localStorage.setItem('txpw', pw); else localStorage.removeItem('txpw'); }catch(e){}
    document.open(); document.write(new TextDecoder().decode(pt)); document.close();
  }catch(e){ err.textContent = '密碼錯誤'; }
}
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') go(); });
(async()=>{ const s = localStorage.getItem('txpw') || sessionStorage.getItem('txpw');
  if(s){ document.getElementById('pw').value = s; if(localStorage.getItem('txpw')) document.getElementById('remember').checked = true; go(); } })();
